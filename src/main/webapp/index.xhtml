<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>URL Shortener</title>
    <h:outputStylesheet name="theme.css" library="primefaces-luna-blue"/>
</h:head>
<h:body>
    <p:panel header="URL Shortener" style="width: 500px; margin: 50px auto;">
        <h:form id="formUrl">
            <p:panelGrid columns="1" style="width: 100%;">
                <p:outputLabel for="url" value="URL:" />
                <p:inputText id="url" value="#{urlBean.originalUrl}"
                            required="true" requiredMessage="URL é obrigatória"
                            placeholder="https://exemplo.com" style="width: 100%;" />

                <p:outputLabel for="alias" value="Alias (opcional):" />
                <p:inputText id="alias" value="#{urlBean.alias}"
                            placeholder="meu-alias" style="width: 100%;" />

                <p:commandButton value="Encurtar URL" action="#{urlBean.shortenUrl}"
                                update="formUrl" ajax="true" />

                <p:message for="url" showDetail="true" />
            </p:panelGrid>

            <p:panel rendered="#{urlBean.shortUrl ne null}" style="margin-top: 20px;">
                <p:panelGrid columns="1" style="width: 100%;">
                    <p:outputLabel value="URL Encurtada:" style="font-weight: bold;" />
                    <p:inputText value="#{urlBean.shortUrl}" readonly="true" style="width: 100%;" />
                    <p:outputLabel value="Código: #{urlBean.shortCode}" />
                    <p:outputLabel value="Acessos: #{urlBean.accessCount}" />
                </p:panelGrid>
            </p:panel>
        </h:form>
    </p:panel>
</h:body>
</html>
